<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
    <title>VARIABLE_NAME_PLACEHOLDER</title>
    <style>
        pre { white-space: pre-wrap; word-break: break-all; margin-bottom: 60px; }
        #pagination {
            position: fixed;
            bottom: 12px;
            right: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--vscode-editor-background, #1e1e1e);
            padding: 6px 12px;
            border: 1px solid var(--vscode-editorWidget-border, #454545);
            border-radius: 4px;
        }
        button {
            background: var(--vscode-button-background, #0e639c);
            color: var(--vscode-button-foreground, #fff);
            border: none;
            padding: 4px 12px;
            cursor: pointer;
            border-radius: 2px;
        }
        button:hover:not(:disabled) { background: var(--vscode-button-hoverBackground, #1177bb); }
        button:disabled { opacity: 0.4; cursor: default; }
    </style>
</head>
<body>
    <pre id="content"></pre>
    <div id="pagination">
        <button id="prev-btn">&#8592; Prev</button>
        <span id="page-info"></span>
        <button id="next-btn">Next &#8594;</button>
    </div>
    <script>
        const pages = PAGES_JSON_PLACEHOLDER;
        let current = 0;

        const content = document.getElementById('content');
        const pageInfo = document.getElementById('page-info');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pagination = document.getElementById('pagination');

        if (pages.length <= 1) {
            pagination.style.display = 'none';
        }

        function showPage(i) {
            current = i;
            content.innerHTML = pages[i];
            pageInfo.textContent = `Page ${i + 1} of ${pages.length}`;
            prevBtn.disabled = i === 0;
            nextBtn.disabled = i === pages.length - 1;
            window.scrollTo(0, 0);
        }

        prevBtn.addEventListener('click', () => { if (current > 0) showPage(current - 1); });
        nextBtn.addEventListener('click', () => { if (current < pages.length - 1) showPage(current + 1); });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'PageUp') prevBtn.click();
            if (e.key === 'ArrowRight' || e.key === 'PageDown') nextBtn.click();
        });

        showPage(0);
    </script>
</body>
</html>
